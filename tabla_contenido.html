    <table border="0" align="center" width="600" cellpadding="10" style="font-family: Arial, sans-serif;">
        <tr>
            <td>
                <h1 id="formulario" align="center">Formulario de Inscripción</h1>
                <hr><br>
                <form action="" method="POST">                
                    <h3>Datos personales</h3>                    
                    <p>
                        <label for="nombre">Nombre completo:</label>
                        <input type="text" id="nombre" name="nombre" size="40" required>
                    </p>                    
                    <p>
                        <label for="edad">Edad:</label>
                        <input type="number" id="edad" name="edad" min="1" max="100" style="width: 60px;">
                    </p>                    
                    <p>
                        <label for="fecha_nacimiento">Fecha de nacimiento:</label>
                        <input type="date" id="fecha_nacimiento" name="fecha_nacimiento">
                    </p>                    
                    <p>
                        <label>Sexo:</label><br>
                        <input type="radio" id="masculino" name="sexo" value="masculino">
                        <label for="masculino">Masculino</label>                        
                        <input type="radio" id="femenino" name="sexo" value="femenino">
                        <label for="femenino">Femenino</label>
                    </p>                    
                    <br><hr>
                    <h3>Información de contacto</h3>                    
                    <p>
                        <label for="email">Correo electrónico:</label>
                        <input type="email" id="email" name="email" size="40" required>
                    </p>                    
                    <p>
                        <label for="telefono">Número de teléfono:</label>
                        <input type="tel" id="telefono" name="telefono" size="20">
                    </p>                    
                    <p>
                        <label for="direccion">Dirección:</label>
                        <input type="text" id="direccion" name="direccion" size="50">
                    </p>                    
                    <br><hr>
                    <br>
                    <div align="center">
                        <input type="submit" value="Enviar Inscripción" style="padding: 10px 20px; font-size: 16px; cursor: pointer;">
                    </div>
                </form>
            </td>
        </tr>
    </table>
